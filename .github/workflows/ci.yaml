name: CI/CD — build, test, and deploy to AWS

# Replaces the upstream Docker-publish workflow (which pushed to ghcr.io/x402-rs/...
# and docker.io/ukstv/... — namespaces this fork cannot write to, so it always failed).
#
# This pipeline:
#   - on every PR and push to main: build + run the test suite (the green gate)
#   - on push to main (once AWS secrets are set): build the image, push to AWS ECR,
#     and `terraform apply` the new image to ECS production, then verify.
#
# AWS auth: IAM access keys stored as repo secrets AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY.
# See docs/CICD_SETUP.md for the IAM policy and secret setup. Until those secrets exist,
# the deploy job is skipped (the run still goes green on the test job).

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: 518898403364.dkr.ecr.us-east-2.amazonaws.com/facilitator
  ECS_CLUSTER: facilitator-production
  ECS_SERVICE: facilitator-production
  CARGO_FEATURES: solana,near,stellar,algorand,sui,xrpl

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (all production features)
        run: cargo build --locked --features ${{ env.CARGO_FEATURES }}
      - name: Test facilitator (x402-rs, all features)
        run: cargo test --locked -p x402-rs --features ${{ env.CARGO_FEATURES }}
      - name: Test workspace crates (axum, reqwest, compliance — incl. doctests)
        run: cargo test --locked -p x402-axum -p x402-reqwest -p x402-compliance

  preflight:
    name: Check deploy prerequisites
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - id: check
        env:
          HAS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          if [ "$HAS_KEY" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "AWS credentials present — deploy will run on main."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy skipped::AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are not set. Add them (see docs/CICD_SETUP.md) to enable auto-deploy."
          fi

  deploy:
    name: Push to ECR & deploy to ECS (production)
    needs: [test, preflight]
    # Deploy on a push to main OR a manual "Run workflow" on main, once AWS secrets exist.
    if: >-
      needs.preflight.outputs.deploy == 'true' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag (version + short SHA)
        id: tag
        run: |
          VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          SHA=$(git rev-parse --short HEAD)
          echo "image_tag=${VER}-${SHA}" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: ${VER}-${SHA}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.image_tag }}
            ${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform apply (roll ECS to the new image)
        working-directory: terraform/environments/production
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -target=aws_ecs_task_definition.facilitator \
            -target=aws_ecs_service.facilitator \
            -var="image_tag=${{ steps.tag.outputs.image_tag }}"

      - name: Wait for ECS rollout to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Verify deployment health
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://facilitator.ultravioletadao.xyz/health || true)
            ver=$(curl -s --max-time 10 https://facilitator.ultravioletadao.xyz/version || true)
            echo "attempt $i: /health=$code /version=$ver"
            [ "$code" = "200" ] && { echo "Facilitator healthy."; exit 0; }
            sleep 6
          done
          echo "::error::Facilitator did not return healthy /health after rollout."
          exit 1
