# =============================================================================
# OpenTelemetry Collector Configuration - ECS Production
# x402-rs Payment Facilitator - Ultravioleta DAO
# =============================================================================
#
# Runs as sidecar in the facilitator ECS task.
# Receives OTLP from facilitator on localhost:4318, pushes to:
#   - Prometheus (remote_write) in the observability task
#   - Tempo (OTLP) in the observability task
#
# The facilitator sends TRACES only (via tracing-opentelemetry).
# The spanmetrics connector derives HTTP metrics from trace spans.
#
# Endpoints configured via environment variables:
#   PROMETHEUS_REMOTE_WRITE_ENDPOINT - e.g. http://observability.facilitator.local:9090/api/v1/write
#   TEMPO_OTLP_ENDPOINT             - e.g. observability.facilitator.local:4317
#
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

connectors:
  # Derive metrics from trace spans (http.server.duration, etc.)
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.status_code
      - name: http.route
      - name: http.target
    dimensions_cache_size: 500
    aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
    metrics_flush_interval: 15s

processors:
  # Prevents OOM by dropping data when memory exceeds limits.
  # check_interval: how often to check memory usage.
  # limit_mib: hard limit - starts refusing data above this.
  # spike_limit_mib: buffer for sudden spikes.
  memory_limiter:
    check_interval: 5s
    limit_mib: 180
    spike_limit_mib: 50

  batch:
    send_batch_size: 512
    timeout: 5s
    send_batch_max_size: 1024

  resource:
    attributes:
      - key: service.namespace
        value: ultravioleta-dao
        action: upsert

exporters:
  # Push metrics to Prometheus via remote_write
  prometheusremotewrite:
    endpoint: ${env:PROMETHEUS_REMOTE_WRITE_ENDPOINT}
    tls:
      insecure: true

  # Push traces to Tempo via OTLP gRPC
  otlp/tempo:
    endpoint: ${env:TEMPO_OTLP_ENDPOINT}
    tls:
      insecure: true

  # Minimal debug output for production
  debug:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 500

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [spanmetrics, otlp/tempo, debug]
    metrics:
      receivers: [spanmetrics]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite, debug]
