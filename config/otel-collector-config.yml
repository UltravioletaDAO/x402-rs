# =============================================================================
# OpenTelemetry Collector Configuration
# x402-rs Payment Facilitator - Ultravioleta DAO
# =============================================================================
#
# The Collector receives OTLP telemetry from the facilitator and routes it:
#   - Traces  -> Tempo (via OTLP)
#   - Metrics -> Prometheus exporter (scraped by Prometheus)
#
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 180
    spike_limit_mib: 50

  batch:
    send_batch_size: 512
    timeout: 5s
    send_batch_max_size: 1024

  # Add resource attributes to all telemetry
  resource:
    attributes:
      - key: service.namespace
        value: ultravioleta-dao
        action: upsert

exporters:
  # Expose metrics in Prometheus format for scraping
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: x402
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true

  # Forward traces to Tempo via OTLP
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Debug output (disable in production)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, debug]
