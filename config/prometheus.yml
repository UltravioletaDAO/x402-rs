# =============================================================================
# Prometheus Configuration for x402 Facilitator
# Ultravioleta DAO
# =============================================================================
#
# Prometheus scrapes metrics from the OpenTelemetry Collector's Prometheus
# exporter (not the facilitator directly - it uses OTLP push, not /metrics).
#
# Architecture:
#   Facilitator --OTLP--> OTel Collector --prometheus exporter--> Prometheus
#
# =============================================================================

# Global configuration
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  external_labels:
    cluster: "x402-facilitator"
    environment: "development"
    project: "ultravioleta-dao"

# Scrape configurations
scrape_configs:
  # =============================================================================
  # OpenTelemetry Collector - Facilitator Metrics
  # =============================================================================
  # The OTel Collector receives OTLP from the facilitator and exposes
  # metrics in Prometheus format on :8889/metrics
  - job_name: "otel-collector-metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: "/metrics"
    scheme: http
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: "x402-facilitator"
          source: "otel-collector"

  # =============================================================================
  # OpenTelemetry Collector - Internal Metrics
  # =============================================================================
  # The Collector's own health/performance metrics
  - job_name: "otel-collector-internal"
    scrape_interval: 30s
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: "otel-collector"

  # =============================================================================
  # Prometheus Self-Monitoring
  # =============================================================================
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

# =============================================================================
# Expected Metrics from OTel Collector (x402_ namespace):
#
# HTTP Server Metrics (auto-generated from tracing-opentelemetry spans):
#   x402_http_server_duration_milliseconds_bucket{http_method, http_route, http_status_code, le}
#   x402_http_server_duration_milliseconds_sum{...}
#   x402_http_server_duration_milliseconds_count{...}
#
# Useful Queries:
#
# Request rate by endpoint:
#   sum by (http_route) (rate(x402_http_server_duration_milliseconds_count[5m]))
#
# p95 latency for /settle:
#   histogram_quantile(0.95, sum(rate(x402_http_server_duration_milliseconds_bucket{http_route="/settle"}[5m])) by (le))
#
# Error rate (5xx):
#   sum(rate(x402_http_server_duration_milliseconds_count{http_status_code=~"5.."}[5m]))
#   / sum(rate(x402_http_server_duration_milliseconds_count[5m])) * 100
#
# Success rate:
#   sum(rate(x402_http_server_duration_milliseconds_count{http_status_code=~"2.."}[5m]))
#   / sum(rate(x402_http_server_duration_milliseconds_count[5m])) * 100
#
# =============================================================================
