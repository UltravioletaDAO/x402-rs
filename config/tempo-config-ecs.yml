# =============================================================================
# Grafana Tempo Configuration - ECS Production
# x402-rs Payment Facilitator - Ultravioleta DAO
# =============================================================================
#
# Receives traces from OTel Collector via OTLP.
# Pushes span-metrics to Prometheus on localhost:9090 (same task).
# Data stored on EFS at /var/tempo.
#
# =============================================================================

stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h  # 7 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: x402-facilitator
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://localhost:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    span_metrics:
      dimensions:
        - http.method
        - http.route
        - http.status_code
        - service.name
    service_graphs:
      dimensions:
        - http.method
        - http.route

overrides:
  defaults:
    metrics_generator:
      processors: [span-metrics, service-graphs]
